
# --- Rate limiting (http context) --------------------------------------------
# IP-keyed token bucket shared across worker processes. 10m of shared memory
# holds ~160k distinct client IPs; `rate` is the steady-state allowance.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;

    # The hostname this server answers for. Use "localhost" for local testing;
    # set to your real domain in production (e.g. jace.example.com).
    server_name localhost;

    # Cap request body size so a single call can't ship a huge payload.
    # Pairs with the per-request input caps on the roadmap.
    client_max_body_size 1m;

    # --- API: reverse-proxy to the app container ---
    # Longest-prefix match means /api/* hits this block; everything else falls
    # through to the static block below.
    location /api/ {

        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://app:8000;


        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;


        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    location / {
        root /usr/share/nginx/html;        # where deploy/nginx.Dockerfile COPYs dist
        try_files $uri $uri/ /index.html;  # SPA fallback: unknown paths -> index.html
    }
}
