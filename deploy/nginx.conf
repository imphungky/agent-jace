
# --- Rate limiting (http context) --------------------------------------------
# IP-keyed token bucket shared across worker processes. 10m of shared memory
# holds ~160k distinct client IPs; `rate` is the steady-state allowance.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# --- HTTP (port 80): ACME + redirect to HTTPS --------------------------------
# Plain HTTP exists only to (a) answer Let's Encrypt's renewal challenge and
# (b) bounce everything else to HTTPS. No app traffic is served here.
server {
    listen 80;
    server_name jacemtg.xyz;

    # Certbot writes its challenge files here during issuance/renewal. Must be
    # served over plain HTTP, so it lives in the :80 server, before the redirect.
    # Requires a shared webroot volume mounted into both nginx and certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to the HTTPS site.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (port 443): the real site -----------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name jacemtg.xyz;

    # Certbot/Let's Encrypt cert + key. These paths are the certbot default for
    # the domain above; mount /etc/letsencrypt into this container (read-only).
    ssl_certificate     /etc/letsencrypt/live/jacemtg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jacemtg.xyz/privkey.pem;

    # Modern, widely-compatible TLS. Drop TLSv1.2 once you don't need old clients.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;         # TLS1.3 ignores this; fine to leave off
    ssl_session_cache   shared:SSL:10m;    # reuse handshakes across connections
    ssl_session_timeout 1d;

    # Tell browsers to always use HTTPS for this host. Start conservative — a long
    # max-age is hard to undo (browsers cache it). Bump to 63072000 + preload once
    # you're confident HTTPS will stay up.
    add_header Strict-Transport-Security "max-age=86400" always;

    # Cap request body size so a single call can't ship a huge payload.
    client_max_body_size 1m;

    # --- API: reverse-proxy to the app container ---
    # Longest-prefix match means /api/* hits this block; everything else falls
    # through to the static block below.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://app:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    location / {
        root /usr/share/nginx/html;        # where deploy/nginx.Dockerfile COPYs dist
        try_files $uri $uri/ /index.html;  # SPA fallback: unknown paths -> index.html
    }
}
