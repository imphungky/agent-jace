services:
  app:
    build: .
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 3s
      retries: 5
  nginx:
    build:
      context: .                      # repo root, so the Dockerfile's COPYs resolve
      dockerfile: deploy/nginx.Dockerfile
    ports: ["127.0.0.1:8080:80"]
    depends_on:
      app:
        condition: service_healthy    # wait until the app's healthcheck passes