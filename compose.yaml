services:
  app:
    build: .
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 3s
      retries: 5
  nginx:
    build:
      context: .                      # repo root, so the Dockerfile's COPYs resolve
      dockerfile: deploy/nginx.Dockerfile
    ports: ["80:80", "443:443"]
    depends_on:
      app:
        condition: service_healthy    # wait until the app's healthcheck passes
    volumes:
      # Certs are issued + renewed by the HOST's certbot into /etc/letsencrypt;
      # nginx only reads them. Bind mount (not a named volume) so the container
      # sees exactly what the host certbot writes.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot for the ACME HTTP-01 challenge. Host certbot writes challenge
      # files here; nginx serves them from /.well-known/acme-challenge/.
      - /var/www/certbot:/var/www/certbot:ro
